name: Rust CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true

      - name: Run tests
        env:
          RUSTFLAGS: "--cfg test_in_ci"
        run: |
          cargo test --all-features --workspace --exclude eros-no-std-test
          cargo test --workspace --exclude eros-no-std-test
          cargo test --no-default-features --workspace --exclude eros-no-std-test

  miri:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Nightly Rust with Miri
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          components: miri
          override: true

      - name: Run Miri tests
        env:
          RUSTFLAGS: "--cfg test_in_ci"
        run: |
          cargo miri test -p eros

  no-std:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: thumbv7em-none-eabihf
          override: true

      - name: Check builds without std
        run: cargo build -p eros-no-std-tests --target thumbv7em-none-eabihf --release

      - name: Run no_std tests (on host)
        env:
          RUSTFLAGS: "--cfg test_in_ci"
        run: cargo test -p eros-no-std-tests